<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requests Page</title>
    <link rel="stylesheet" href="request.css">
</head>
<body>
    <header class="flex navigation">
        <a href="admin.html" class="info">Back</a>
        <h2 class="logo">Requests information</h2>
    </header>
    <div class="container">
        <table id="user-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User ID</th>
                    <th>Device</th>
                    <th>Requests Date</th>
                    <th>Status</th>
                    <th>Edit</th>
                </tr>
            </thead>
            <tbody id="request"> </tbody>
        </table>
    </div>

    <div class="wrapper">
        <span class="icon-close"><ion-icon name="close"></ion-icon></span>
        <div class="popup">
            <h2>Edit Stock</h2>
            <form id="Form">
                <span class="icon-close" onclick="closeForm()">X</span>
                <label for="userid">User id:</label>
                <input type="number" id="id" name="id" required><br>

                <label for="stock_name">Device Name:</label>
                <input type="text" id="name" name="name" required><br>
    
                <label for="date">Request Date:</label>
                <input type="date" id="date" name="date" required><br>

                <label for="status">Status:</label>
                <select id="status" name="status" required>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="rejected">Rejected</option>
                    <option value="borrowed">Borrowed</option>
                </select><br>
                <button type="submit" class="save" >Save Changes</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script src="request.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Page</title>
</head>

<body>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-image: url('img/25.jpg');
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #FFFBF5;
            /* สีข้อความหลัก */
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 99;
            background: rgba(255, 255, 255, 0.2);
            /* เพิ่มความโปร่งแสง */
            backdrop-filter: blur(12px);
            /* เพิ่มความเบลอ */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            /* เพิ่มเงา */
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            /* เพิ่มเส้นขอบด้านล่าง */
        }

        .info {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.2s ease;
            /* เพิ่ม transition transform */
            border: 2px solid #2D336B;
            background: transparent;
            /* เปลี่ยนสีปุ่ม Back */
            color: #2D336B;
        }

        .info:hover {
            transform: translateY(-3px);
            /* ยกปุ่มขึ้นเล็กน้อยเมื่อ hover */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            /* เพิ่มเงาเมื่อ hover */
            background: #2D336B;
            color: white;
        }

        .image-container {
            max-width: 800px;
            width: 100%;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 1;
        }

        .image-wrapper {
            overflow: hidden;
            /* ซ่อนส่วนที่เกินขอบ */
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: box-shadow 0.3s ease;
        }

        .image-wrapper:hover {
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.35);
        }

        .news-image {
            width: 100%;
            height: auto;
            display: block;
            /* แก้ปัญหาช่องว่างด้านล่างรูป */
            transition: transform 0.3s ease;
        }

        .news-image:hover {
            transform: scale(1.05);
            /* ขยายรูปเล็กน้อย */
        }
        @media screen and (max-width: 600px) {
    .navigation {
        flex-direction: column;
        align-items: flex-start;
        margin-left: 0;
        width: 100%;
        background: transparent;
    }

    .navigation a,
    .navigation .btnLogin-popup {
        margin: 10px 0;
        width: 100%;
        text-align: center;
    }

    .navigation a::after {
        display: none;
    }

    .wrapper {
        width: auto; /* เพิ่มขนาด wrapper เล็กน้อย */
    }

    .form-box {
        padding: 20px; /* ลด padding เล็กน้อย */
    }
}
    </style>
    <header>
        <a href="home.html" class="info">Back</a>
    </header>

    <div class="image-container">
        <div class="image-wrapper">
            <img src="img/26.jpg" alt="News Image" class="news-image">
        </div>
        <div class="image-wrapper">
            <img src="img/27.jpg" alt="News Image" class="news-image">
        </div>
    </div>
</body>

</html>

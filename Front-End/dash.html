<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Office Supplies</title>
</head>
<body>
    <h1>📊 Dashboard ระบบยืมอุปกรณ์</h1>

    <div class="dashboard">
        <div class="card">
            <h2>📦 อุปกรณ์ทั้งหมด</h2>
            <p id="totalSupplies">0</p>
        </div>
        <div class="card">
            <h2>📌 ยืมอยู่</h2>
            <p id="borrowedSupplies">0</p>
        </div>
        <div class="card">
            <h2>⏳ รออนุมัติ</h2>
            <p id="pendingRequests">0</p>
        </div>
        <div class="card">
            <h2>⚠️ เกินกำหนด</h2>
            <p id="pendingSupplies">0</p>
        </div>
    </div>

    <script src="dash.js"></script>
</body>
</html>

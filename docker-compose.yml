version: '3.7'

services:
  db:
    image: mysql:5.7
    container_name: mypro_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: webdb
    ports:
      - "8890:3306" #3306 port default
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - weblab820
    restart: always

  phpmyadmin: #ตัวจัดารฐานข้อมูล
    image: phpmyadmin/phpmyadmin:latest
    container_name: Mypro_phpmyadmin
    environment:
      PMA_HOST: mypro_db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8891:80"
    depends_on:
      - db
    networks:
      - weblab820
    restart: always

networks:
  weblab820:
    driver: bridge

volumes:
  mysql_data: #error คือไปซ้ำกับคนอื่น
    driver: local